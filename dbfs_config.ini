[database]
host = 127.0.0.1
port = 5432
dbname = dbfsdbname
user = dbfsuser
password = cichosza
sslmode = require
#sslrootcert = /path/to/ca.crt
sslcert = /etc/dbfs/.dbfs/tls/client.crt
sslkey =  /etc/dbfs/.dbfs/tls/client.key

[dbfs]
# Balanced default for mixed metadata and moderate I/O workloads.
pool_max_connections = 10
synchronous_commit = on
write_flush_threshold_bytes = 67108864
read_cache_blocks = 1024
read_ahead_blocks = 4
sequential_read_ahead_blocks = 8
small_file_read_threshold_blocks = 8
workers_read = 4
workers_read_min_blocks = 8
workers_write = 4
workers_write_min_blocks = 8
persist_buffer_chunk_blocks = 128
metadata_cache_ttl_seconds = 1
statfs_cache_ttl_seconds = 2
lock_backend = postgres_lease
lock_lease_ttl_seconds = 30
lock_heartbeat_interval_seconds = 10
lock_poll_interval_seconds = 0.1

[dbfs.profile.bulk_write]
# Best for ingest, large sequential copies, throughput runs, and remount durability checks.
write_flush_threshold_bytes = 268435456
read_cache_blocks = 512
read_ahead_blocks = 2
sequential_read_ahead_blocks = 4
small_file_read_threshold_blocks = 4
workers_read = 4
workers_read_min_blocks = 8
workers_write = 8
workers_write_min_blocks = 8
persist_buffer_chunk_blocks = 512
metadata_cache_ttl_seconds = 2
statfs_cache_ttl_seconds = 2
lock_backend = postgres_lease
lock_lease_ttl_seconds = 30
lock_heartbeat_interval_seconds = 10
lock_poll_interval_seconds = 0.1

[dbfs.profile.metadata_heavy]
# Best for ls/find/stat-heavy browsing and deep tree inspection.
write_flush_threshold_bytes = 67108864
read_cache_blocks = 1024
read_ahead_blocks = 4
sequential_read_ahead_blocks = 8
small_file_read_threshold_blocks = 8
workers_read = 4
workers_read_min_blocks = 8
workers_write = 4
workers_write_min_blocks = 8
metadata_cache_ttl_seconds = 5
statfs_cache_ttl_seconds = 5
lock_backend = postgres_lease
lock_lease_ttl_seconds = 30
lock_heartbeat_interval_seconds = 10
lock_poll_interval_seconds = 0.1

[dbfs.profile.pg_locking]
# Best for multi-client coordination and lock regression testing.
lock_backend = postgres_lease
lock_lease_ttl_seconds = 30
lock_heartbeat_interval_seconds = 10
lock_poll_interval_seconds = 0.05
