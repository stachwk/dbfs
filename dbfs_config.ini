[database]
host = 127.0.0.1
port = 5432
dbname = dbfsdbname
user = dbfsuser
password = cichosza
#sslmode = require
#sslrootcert = /path/to/ca.crt
#sslcert = /etc/dbfs/.dbfs/tls/client.crt
#sslkey =  /etc/dbfs/.dbfs/tls/client.key

[dbfs]
# Balanced default for mixed metadata and moderate I/O workloads.
pool_max_connections = 10
synchronous_commit = on
write_flush_threshold_bytes = 67108864
max_fs_size_bytes = 10GiB
# Optional override for what PostgreSQL can actually see on disk.
# If unset, DBFS tries SHOW data_directory and statvfs() on that path.
# pg_visible_path = /var/lib/postgresql/data/pgdata
read_cache_blocks = 1024
read_ahead_blocks = 4
sequential_read_ahead_blocks = 8
small_file_read_threshold_blocks = 8
workers_read = 4
workers_read_min_blocks = 8
workers_write = 4
workers_write_min_blocks = 8
persist_buffer_chunk_blocks = 128
# Copy dedupe controls: enable changed-block skipping during copy_file_range().
copy_dedupe_enabled = false
# Lower gate: only try copy dedupe once the transfer reaches at least this many blocks.
copy_dedupe_min_blocks = 16
# Optional upper cap: 0 disables the cap and allows dedupe for any size above the lower gate.
copy_dedupe_max_blocks = 0
# Optional CRC cache for unchanged-block detection. Populated on demand and stored in PostgreSQL.
copy_dedupe_crc_table = false
# Most Rust hot-path work now goes through the Rust backend; env vars can still force the Rust path off for comparison.
# Copy dedupe stays opt-in because it can slow writes down substantially on some workloads.
rust_hotpath_copy_dedupe = false
rust_hotpath_copy_plan = true
rust_hotpath_copy_pack = true
# Rust hot-path persist padding is enabled by default via the Rust backend; env vars can still force it off for comparison.
rust_hotpath_persist_pad = true
# Rust hot-path read assembly is enabled by default via the Rust backend; env vars can still force it off for comparison.
rust_hotpath_read_assemble = true
metadata_cache_ttl_seconds = 1
statfs_cache_ttl_seconds = 2
lock_backend = postgres_lease
lock_lease_ttl_seconds = 30
lock_heartbeat_interval_seconds = 10
lock_poll_interval_seconds = 0.1

[dbfs.profile.bulk_write]
# Best for ingest, large sequential copies, throughput runs, and remount durability checks.
write_flush_threshold_bytes = 268435456
read_cache_blocks = 1024
read_ahead_blocks = 4
sequential_read_ahead_blocks = 8
small_file_read_threshold_blocks = 8
workers_read = 4
workers_read_min_blocks = 8
workers_write = 8
workers_write_min_blocks = 16
persist_buffer_chunk_blocks = 512
copy_dedupe_max_blocks = 0
rust_hotpath_copy_dedupe = false
rust_hotpath_copy_plan = true
rust_hotpath_copy_pack = true
rust_hotpath_persist_pad = true
rust_hotpath_read_assemble = true
metadata_cache_ttl_seconds = 1
statfs_cache_ttl_seconds = 1
lock_backend = postgres_lease
lock_lease_ttl_seconds = 30
lock_heartbeat_interval_seconds = 10
lock_poll_interval_seconds = 0.1

[dbfs.profile.metadata_heavy]
# Best for ls/find/stat-heavy browsing and deep tree inspection.
write_flush_threshold_bytes = 67108864
read_cache_blocks = 2048
read_ahead_blocks = 4
sequential_read_ahead_blocks = 8
small_file_read_threshold_blocks = 16
workers_read = 2
workers_read_min_blocks = 16
workers_write = 2
workers_write_min_blocks = 16
persist_buffer_chunk_blocks = 64
rust_hotpath_copy_dedupe = false
rust_hotpath_copy_plan = true
rust_hotpath_copy_pack = true
rust_hotpath_persist_pad = true
rust_hotpath_read_assemble = true
metadata_cache_ttl_seconds = 10
statfs_cache_ttl_seconds = 10
lock_backend = postgres_lease
lock_lease_ttl_seconds = 30
lock_heartbeat_interval_seconds = 10
lock_poll_interval_seconds = 0.1

[dbfs.profile.pg_locking]
# Best for multi-client coordination and lock regression testing.
workers_read = 1
workers_read_min_blocks = 16
workers_write = 1
workers_write_min_blocks = 16
persist_buffer_chunk_blocks = 64
rust_hotpath_copy_dedupe = false
rust_hotpath_copy_plan = true
rust_hotpath_copy_pack = true
rust_hotpath_persist_pad = true
rust_hotpath_read_assemble = true
metadata_cache_ttl_seconds = 1
statfs_cache_ttl_seconds = 1
lock_backend = postgres_lease
lock_lease_ttl_seconds = 30
lock_heartbeat_interval_seconds = 10
lock_poll_interval_seconds = 0.05
