name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install Python dependencies
        run: python -m pip install --upgrade pip fusepy psycopg2-binary
      - name: Byte-compile core modules and tests
        run: python -m py_compile dbfs_backend.py dbfs_bootstrap.py dbfs_fuse.py dbfs_identity.py dbfs_journal.py dbfs_locking.py dbfs_metadata.py dbfs_namespace.py dbfs_permissions.py dbfs_pg_lock_manager.py dbfs_pg_tls.py dbfs_repository.py dbfs_runtime_validation.py dbfs_schema.py dbfs_storage.py dbfs_time.py dbfs_xattr_acl.py dbfs_xattr_store.py mkfs.dbfs.py tests/integration/test_metadata_cache.py tests/integration/test_mkfs_pg_tls.py tests/integration/test_pg_lock_manager.py tests/integration/test_postgresql_requirements.py tests/integration/test_runtime_config.py tests/integration/test_runtime_profile.py tests/integration/test_runtime_validation.py tests/integration/test_schema_upgrade.py

  db-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - test-runtime-config
          - test-runtime-validation
          - test-runtime-profile
          - test-mkfs-pg-tls
          - test-postgresql-requirements
          - test-schema-upgrade
          - test-schema-status
          - test-metadata-cache
          - test-pg-lock-manager
          - test-read-ahead-sequence
          - test-block-read
          - test-flush-release-profile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install Python dependencies
        run: python -m pip install --upgrade pip fusepy psycopg2-binary
      - name: Run DBFS target
        run: make ${{ matrix.target }}
